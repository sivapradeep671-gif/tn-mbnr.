services:
  - type: web
    name: tn-mbnr-production
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        generateValue: true
      - key: QR_SECRET_KEY
        value: "MBNR_SECURE_TOKEN_2026_GRID"
      - key: DB_PATH
        value: "/data/tn_mbnr.db"
      - key: UPLOADS_PATH
        value: "/data/uploads"
      - key: MONGODB_URI
        sync: false
      - key: VITE_GEMINI_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: "alerts@tn-mbnr.gov.in"
    healthCheckPath: /api/health
    disk:
      name: tn-mbnr-storage
      mountPath: /data
      sizeGB: 1
