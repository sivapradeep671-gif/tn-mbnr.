openapi: 3.0.0
info:
  title: TrustReg TN - Unified E-Governance API
  description: Regional registry grid for business lifecycle management and civic verification.
  version: 1.2.0

servers:
  - url: /api
    description: Primary Regional Node

paths:
  /health:
    get:
      summary: Node Health Check
      responses:
        '200':
          description: OK
  
  /auth/login:
    post:
      summary: Secure Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone: { type: string }
                role: { type: string, enum: [citizen, business, admin] }
      responses:
        '200':
          description: Success
          content:
             application/json:
               schema:
                 type: object
                 properties:
                   token: { type: string }

  /businesses:
    get:
      summary: Public Registry Query
      responses:
        '200':
          description: List of verified enterprises
    post:
      summary: Register New Enterprise
      security:
        - BearerAuth: []
      responses:
        '201': 
          description: Block added to ledger

  /verify-scan:
    post:
      summary: Forensic QR Verification
      description: Verifies dynamic QR tokens and checks geofencing thresholds.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                scannerLocation:
                  type: object
                  properties:
                    lat: { type: number }
                    lng: { type: number }
      responses:
        '200':
          description: Verification Status

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
